name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify tag matches gem version
        if: github.event_name == 'push'
        run: |
          version="$(ruby -Ilib -rscreenshotapi/version -e 'puts ScreenshotAPI::VERSION')"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - run: bundle exec rake test
      - run: gem build screenshotapi.gemspec

      - uses: rubygems/release-gem@v1
