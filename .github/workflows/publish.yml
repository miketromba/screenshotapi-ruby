name: Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Type "publish" to publish this version to RubyGems.
        required: true
        default: dry-run

jobs:
  push:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - run: bundle exec rake test
      - run: gem build screenshotapi.gemspec

      - name: Publish to RubyGems
        if: github.event.inputs.publish == 'publish'
        uses: rubygems/release-gem@v1
